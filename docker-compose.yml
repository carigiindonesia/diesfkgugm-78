services:
  app:
    image: ghcr.io/${IMAGE_NAME}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    ports:
      - "8081:8081"
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/up"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  worker:
    image: ghcr.io/${IMAGE_NAME}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    command: ["supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql-data:
  storage:

networks:
  app-network:
    driver: bridge
